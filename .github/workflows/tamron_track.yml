name: Tamron Lens Tracker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install selenium python-dotenv

      - name: Run bot
        env:
          GMAIL_KORISNIK: ${{ secrets.GMAIL_KORISNIK }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_PRIMALAC: ${{ secrets.GMAIL_PRIMALAC }}
        run: python main.py
